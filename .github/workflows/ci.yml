name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .[gui] pytest
      - run: pytest tests/test_units.py -v
      - run: pytest tests/test_golden.py -v
        env:
          DUALRIP_TEST_SDAT: ${{ secrets.DUALRIP_TEST_SDAT }}
